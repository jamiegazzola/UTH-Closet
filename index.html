<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
    <title>Uth Closet</title>
    <meta name="description" content="Private, no questions asked — browse and pre-order what you need." />
    <meta name="theme-color" content="#003865" />
    <!-- manifest/icon links removed until icon files are added to /public -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Open+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <style>
      #initial-loader { display: flex; }
      #root:not(:empty) + * { display: none; }
    </style>
    <script type="module" src="/src/main.jsx"></script>
  </head>
  <body>
    <!-- Inline loading screen: visible instantly before JS loads -->
    <div id="initial-loader" style="position:fixed;inset:0;min-height:100vh;background:linear-gradient(160deg,#002548 0%,#003865 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:9999;">
      <svg width="80" height="50" viewBox="0 0 80 50" fill="none">
        <circle cx="20" cy="10" r="8" fill="#32BCAD"/>
        <circle cx="42" cy="10" r="8" fill="#32BCAD" opacity=".65"/>
        <text x="0" y="46" font-family="sans-serif" font-size="38" font-weight="700" fill="white">uth</text>
      </svg>
      <div style="width:32px;height:32px;border:3px solid rgba(50,188,173,.3);border-top-color:#32BCAD;border-radius:50%;animation:uth-spin 1s linear infinite;"></div>
      <style>@keyframes uth-spin{to{transform:rotate(360deg)}}</style>
    </div>
    <div id="root"></div>
    <script>
      // Hide loader once React has mounted something into #root
      const observer = new MutationObserver(() => {
        if (document.getElementById('root').children.length > 0) {
          const loader = document.getElementById('initial-loader')
          if (loader) {
            loader.style.opacity = '0'
            loader.style.transition = 'opacity 0.3s ease'
            setTimeout(() => loader.remove(), 300)
          }
          observer.disconnect()
        }
      })
      observer.observe(document.getElementById('root'), { childList: true })
    </script>
  </body>
</html>
